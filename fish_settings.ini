# FISH settings
# Edit and re-run: source install_fish.sh

[nsys]
trace = cuda,nvtx
cuda_memory_usage = true
cudabacktrace = kernel,memory,sync
python_backtrace = cuda
python_sampling = true
pytorch = autograd-nvtx
sample = process-tree
cpuctxsw = none
export = sqlite
# --cuda-event-trace: trace CUDA event completion on device side so that
# cudaEventRecord ↔ cudaStreamWaitEvent correlate deterministically in
# the CUPTI SYNC table. Without this flag, eventId=-1 for every type-2
# row and src→dst stream DAG edges must be inferred via time-proximity
# heuristic (notes/gpu_mapping_datapoints.txt obs F). Turn on for paper
# measurement runs — adds some runtime overhead and can introduce false
# cross-stream dependencies when cudaEvent timing is not disabled.
cuda_event_trace = true
# --cuda-graph-trace: when the workload uses CUDA Graphs (cudaGraphLaunch),
# the default `graph` mode collapses all nodes of a captured graph into a
# single record — we lose per-kernel granularity needed for DAG extraction.
# `node` mode records each node individually. Required for FISH's Typed
# DAG work whenever TRT or any framework uses graph capture.
cuda_graph_trace = graph  # was 'node' — suspected heavy overhead on Autoware
# --cuda-trace-all-apis: default skips "non-critical" CUDA APIs (trivial
# getters, some queries). Turn on for completeness on paper-grade runs —
# every API call contributes to the CPU-side timeline the Typed DAG
# builds from.
cuda_trace_all_apis = true
# Intentionally NOT set (considered + rejected 2026-04-20):
#   --cpuctxsw=process-tree : LTTng sched_switch already captures OS
#     context switches; nsys' version would be redundant and risks
#     destabilising multi-threaded composable containers.
#   --backtrace=dwarf : we only need top-frame kernel symbols (provided
#     by CUPTI_KERNEL.shortName), not deep stack unwinds.
#   --trace=...,cudnn,cublas : per-kernel name already distinguishes
#     cuDNN / cuBLAS kernels in practice; library-level attribution not
#     needed for the paper's task model.

[daemon]
# Seconds between each /proc scan
poll_interval = 1.0

# Seconds to wait after detecting a new process before acting
# (allows node initialization and CUDA library loading to complete)
settle_time = 3.0

# Seconds to wait for nsys to finish writing reports on shutdown
nsys_report_timeout = 120

# --- System stabilization ---
# FISH waits for BOTH checks to pass before any kill/nsys operations.
# Each check polls independently and requires N consecutive identical
# results to declare stable.

# Component list stability: polls `ros2 component list`
component_list_stability_interval = 10.0
component_list_stability_count = 2

# Executor started stability: counts "process started with pid" lines
# from launch stdout (/tmp/fish_launch_output.log)
executor_started_stability_interval = 10.0
executor_started_stability_count = 3

# --- Run-mode stabilization (ros2 run, no launch system) ---
# Daemon scans for new GPU processes. If no new GPU process appears
# for scan_stable_count consecutive polls (each poll_interval seconds),
# the system is considered stable and fish_system_stable is written.
# If a new GPU process appears later, it is still handled (kill/relaunch)
# and the stable signal is re-written after post_relaunch_settle seconds.
scan_stable_count = 5
post_relaunch_settle = 5.0

[replay]
# Start rosbag replay after system stable + GPU handler complete?
# true  = rosbag scenario (no live simulator, data comes from bag file)
# false = live simulator (e.g. AWSIM provides sensor data, no bag needed)
replay_rosbag = true

# Command to run when replay_rosbag = true
command = ros2 bag play ~/autoware_map/sample-rosbag -r 0.2 -s sqlite3

# Automatically stop FISH when replay command exits
auto_stop = true

[trace]
output_dir = ~/fish_traces
