# FISH settings
# Edit and re-run: source install_fish.sh

[nsys]
trace = cuda,nvtx
cuda_memory_usage = true
cudabacktrace = kernel,memory,sync
python_backtrace = cuda
python_sampling = true
pytorch = autograd-nvtx
sample = process-tree
cpuctxsw = none
export = sqlite

[daemon]
# Seconds between each /proc scan
poll_interval = 1.0

# Seconds to wait after detecting a new process before acting
# (allows node initialization and CUDA library loading to complete)
settle_time = 3.0

# Seconds to wait for nsys to finish writing reports on shutdown
nsys_report_timeout = 120

[trace]
output_dir = ~/fish_traces
