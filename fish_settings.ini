# FISH settings
# Edit and re-run: source install_fish.sh

[perf]
# CPU call-graph sampling frequency in Hz.
# Higher = more accurate call graphs, more overhead.
#   1000   (1KHz)   — coarse, ~0% overhead
#   10000  (10KHz)  — good balance, ~1-2% overhead
#   100000 (100KHz) — near-complete call graph, ~5-10% overhead
sampling_frequency = 10000

# Backtrace method: dwarf (most accurate), fp (fast but needs frame pointers), lbr (Intel only)
call_graph_method = dwarf

# Attach perf to ROS 2 nodes automatically
auto_attach = true

[nsys]
trace = cuda,nvtx
cuda_memory_usage = true
cudabacktrace = kernel,memory,sync
python_backtrace = cuda
python_sampling = true
pytorch = autograd-nvtx
sample = process-tree
cpuctxsw = none
export = sqlite

[daemon]
# Seconds between each /proc scan
poll_interval = 1.0

# Seconds to wait after detecting a new process before acting
# (allows node initialization to complete)
settle_time = 3.0

# Seconds to wait for nsys to finish writing reports on shutdown
nsys_report_timeout = 120

[trace]
output_dir = /tmp/fish_traces
