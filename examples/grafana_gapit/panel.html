<div class="fish-viz-root">
  <div class="fv-toolbar">
    <div class="fv-tabs">
      <button class="active" data-mode="expand" title="Expand mode">⊕</button>
      <button data-mode="layer" title="Layer mode">≡</button>
    </div>

    <div class="fv-btn-group fv-depthBtns" style="display:none">
      <button data-depth="-1">Cont</button>
      <button data-depth="0" class="active">Exec</button>
      <button data-depth="1">Node</button>
      <button data-depth="2">Entity</button>
      <button data-depth="3">CB</button>
      <button data-depth="99">All</button>
    </div>

    <div class="fv-btn-group fv-layoutBtns">
      <button data-layout="force" class="active">Force</button>
      <button data-layout="tree">Tree</button>
      <button data-layout="stair">Stair</button>
    </div>

    <select class="fv-stairMode" style="display:none">
      <option value="3" selected>3-cycle</option>
      <option value="0">Flat</option>
      <option value="inf">Continuous</option>
    </select>

    <label><input type="checkbox" class="fv-showExternal"> Ext</label>
    <label><input type="checkbox" class="fv-showLabels" checked> Lbl</label>
    <label><input type="checkbox" class="fv-showContain" checked> Hier</label>

    <button class="fv-small-btn fv-collapseAll">Reset</button>
    <button class="fv-small-btn fv-popout" title="Open in a new window (full-screen, draggable, multi-monitor friendly)">Pop out ↗</button>
    <button class="fv-small-btn fv-gantt" title="Open per-thread callback gantt in a new window (D3 zoom/pan)">Gantt ↗</button>
    <span class="fv-stats"></span>
  </div>

  <svg class="fv-svg"></svg>

  <div class="fv-info" style="display:none"></div>
  <div class="fv-tooltip" style="display:none"></div>
</div>
