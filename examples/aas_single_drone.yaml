# FISH Mission: AAS single-drone simulation
#
# Traces a full takeoff → orbit → land mission on the Aerial Autonomy Stack
# with FISH running in all three containers.
#
# Prerequisites:
#   1. Start the AAS system:  cd ~/aerial-autonomy-stack/scripts && ./sim_run.sh
#   2. Wait for all containers to be up and Gazebo loaded
#   3. Run this mission:  python3 fish_orchestrator.py missions/aas_single_drone.yaml
#
# Action types from: autopilot_interface_msgs/action/{Takeoff,Orbit,Land}
# Source chain needed inside aircraft container for ros2 commands.

name: aas_single_drone_mission

containers:
  simulation:
    docker_name: simulation-container-inst0
    fish: true
    trace_path: /root/fish_traces
    host_trace_path: ~/fish_traces/simulation
    role: simulation

  ground:
    docker_name: ground-container-inst0
    fish: true
    trace_path: /root/fish_traces
    host_trace_path: ~/fish_traces/ground
    role: ground

  aircraft:
    docker_name: aircraft-container-inst0_1
    fish: true
    trace_path: /root/fish_traces
    host_trace_path: ~/fish_traces/aircraft_1
    role: aircraft

launch:
  command: "cd ~/aerial-autonomy-stack/scripts && AUTOPILOT=px4 NUM_QUADS=1 NUM_VTOLS=0 WORLD=swiss_town HEADLESS=false RTF=3.0 ./sim_run.sh"
  timeout: 180

ready:
  fish_stable:
    - aircraft
  timeout: 180

actions:
  # Source chain for ros2 commands inside the aircraft container
  # (github_ws has autopilot_interface_msgs, aircraft_ws has the nodes)

  - log: "Waiting for PX4 SITL init (GPS fix, EKF convergence)..."
  - sleep: 30

  - log: "Takeoff to 40m"
  - exec:
      container: aircraft
      run: >
        source /opt/ros/humble/setup.bash &&
        source /aas/github_ws/install/setup.bash &&
        source /aas/aircraft_ws/install/setup.bash &&
        timeout 120 ros2 action send_goal
        /Drone1/takeoff_action
        autopilot_interface_msgs/action/Takeoff
        '{takeoff_altitude: 40.0}' --feedback
      wait: true
      timeout: 120

  - sleep: 10

  - log: "Orbit — east=200 north=0 alt=80 radius=100"
  - exec:
      container: aircraft
      run: >
        source /opt/ros/humble/setup.bash &&
        source /aas/github_ws/install/setup.bash &&
        source /aas/aircraft_ws/install/setup.bash &&
        timeout 120 ros2 action send_goal
        /Drone1/orbit_action
        autopilot_interface_msgs/action/Orbit
        '{east: 200.0, north: 0.0, altitude: 80.0, radius: 100.0}' --feedback
      wait: true
      timeout: 120

  - sleep: 10

  - log: "Land at 10m"
  - exec:
      container: aircraft
      run: >
        source /opt/ros/humble/setup.bash &&
        source /aas/github_ws/install/setup.bash &&
        source /aas/aircraft_ws/install/setup.bash &&
        timeout 120 ros2 action send_goal
        /Drone1/land_action
        autopilot_interface_msgs/action/Land
        '{landing_altitude: 10.0}' --feedback
      wait: true
      timeout: 120

  - sleep: 10
  - log: "Mission complete"

finish:
  fish_stop:
    - aircraft
    - ground
    - simulation
  wait_after_stop: 15
  collect_traces: true
  stop_containers: false   # sim_run.sh cleanup handles this

output: ~/fish_traces
