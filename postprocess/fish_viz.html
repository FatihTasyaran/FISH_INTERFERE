<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>FISH — Hierarchical Expansion Explorer</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:#fafafa;overflow:hidden}
#controls{position:fixed;top:10px;left:10px;z-index:10;background:#fff;padding:12px 16px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.12);font-size:13px;line-height:2}
#controls b{font-size:15px}
#controls select,#controls button{padding:3px 8px;border:1px solid #ccc;border-radius:4px;font-size:12px;background:#fff;cursor:pointer}
#controls button{background:#e8e8e8}
#controls button:hover{background:#ddd}
#info{position:fixed;top:10px;right:10px;z-index:10;background:#fff;padding:14px;border-radius:8px;width:320px;font-size:12px;max-height:85vh;overflow-y:auto;box-shadow:0 2px 8px rgba(0,0,0,.12)}
#info h3{margin:0 0 8px;font-size:14px;color:#333}
.field{margin:2px 0}.key{color:#888;font-size:11px}.val{color:#222}
#stats{position:fixed;bottom:10px;left:10px;z-index:10;background:rgba(255,255,255,.95);padding:6px 12px;border-radius:6px;font-size:11px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
#legend{position:fixed;bottom:10px;right:10px;z-index:10;background:rgba(255,255,255,.95);padding:6px 12px;border-radius:6px;font-size:11px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.legend-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:3px;vertical-align:middle}
svg{width:100vw;height:100vh}
.link{fill:none;stroke-opacity:.45}
.link.msg{stroke:#4A90D9}
.link.comm{stroke:#27AE60}
.link.dep{stroke:#E74C3C}
.link.external{stroke-dasharray:5,3;stroke-opacity:.2}
.link.dim{opacity:.02}
.node circle{cursor:pointer;stroke-width:2}
.node text{pointer-events:none;fill:#444;font-size:10px;text-anchor:middle}
.node.EX circle{fill:#5DADE2;stroke:#2980B9}
.node.N circle{fill:#58D68D;stroke:#27AE60}
.node.E circle{fill:#F4D03F;stroke:#D4AC0D}
.node.E.ext circle{fill:#CCC;stroke:#999;stroke-dasharray:3,2}
.node.F circle{fill:#F0F0F0;stroke:#BBB}
.node.F.ext circle{fill:#DDD;stroke:#999;stroke-dasharray:3,2}
.node.has-children circle{cursor:zoom-in}
.node.dim{opacity:.1}
.tt{position:absolute;background:#333;color:#fff;padding:4px 8px;border-radius:4px;font-size:11px;pointer-events:none;z-index:20;white-space:nowrap}
</style>
</head>
<body>
<div id="controls">
  <b>FISH Expansion Explorer</b><br>
  <label>Expand to: <select id="expandLevel">
    <option value="0" selected>L0 — Executors</option>
    <option value="1">L1 — Nodes</option>
    <option value="2">L2 — Entities</option>
    <option value="3">L3 — Functions</option>
  </select></label>
  <button id="collapseAll">Reset</button><br>
  <label><input type="checkbox" id="showExternal"> External</label>
  <label><input type="checkbox" id="showLabels" checked> Labels</label>
  <label>Stair step: <select id="stairMode">
    <option value="3" selected>3-cycle</option>
    <option value="0">Flat</option>
    <option value="inf">Continuous</option>
  </select></label>
</div>
<div id="info"><h3>FISH Graph</h3>
<p style="color:#666;font-size:12px">
<b>Click</b> a node to expand into children.<br>
<b>Right-click</b> to collapse back to parent.<br>
<b>Scroll</b> to zoom, <b>drag</b> background to pan.
</p></div>
<div id="stats"></div>
<div id="legend">
  <span class="legend-dot" style="background:#5DADE2"></span>Executor
  <span class="legend-dot" style="background:#58D68D;margin-left:8px"></span>Node
  <span class="legend-dot" style="background:#F4D03F;margin-left:8px"></span>Entity
  <span class="legend-dot" style="background:#E0E0E0;margin-left:8px"></span>Function
</div>
<svg></svg>
<div class="tt" id="tooltip" style="display:none"></div>
<script>
const R = {EX:20,N:14,E:10,F:7};
const LAYER_GAP = 180;
const STAIR_STEP = 16;
const NODE_SPACING = 90;

fetch('fish_graph.json').then(r=>r.json()).then(raw=>{
  const byId = {};
  raw.nodes.forEach(n=>{ byId[n.id] = n; });

  const parentOf = {};
  const childrenOf = {};
  raw.nodes.forEach(n=>{
    (n.children||[]).forEach(c=>{
      parentOf[c] = n.id;
      (childrenOf[n.id] = childrenOf[n.id]||[]).push(c);
    });
  });

  // Use deepest available comm edges: L3 for function-level detail, with L2
  // fallback for entities without functions. visibleAncestor aggregates upward.
  // Deduplicate: if an L2 edge has a corresponding L3 edge, skip the L2 one.
  const l3pairs = new Set();
  raw.edges.filter(e=>e.rel==="comm"&&e.level==="L3").forEach(e=>{
    // L3 edge (F→F): find their parent entities and record the E→E pair
    const pe = parentOf[e.source], qe = parentOf[e.target];
    if(pe && qe) l3pairs.add(pe+"-"+qe);
  });
  const base = raw.edges
    .filter(e=>{
      if(e.rel!=="comm") return false;
      if(e.level==="L3") return true;
      if(e.level==="L2"){
        // skip if L3 already covers this E→E pair
        return !l3pairs.has(e.source+"-"+e.target);
      }
      return false;
    })
    .map(e=>({s:e.source, d:e.target, topic:e.topic||e.service||"",
              nature:e.nature||"msg", msg_type:e.msg_type||"",
              hz:e.avg_rate_hz||0, ext:!!e.external}));

  const exp = new Set();
  let showExt = false, showLbl = true, stairMode = "3";

  function isVis(id){
    const n=byId[id]; if(!n) return false;
    if(n.external) return showExt;
    if(n.type==="EX") return !exp.has(id);
    const p=parentOf[id];
    return p!==undefined && exp.has(p) && !exp.has(id);
  }

  function visAnc(id){
    if(isVis(id)) return id;
    const p=parentOf[id];
    return p!==undefined ? visAnc(p) : null;
  }

  function getVisNodes(){ return raw.nodes.filter(n=>isVis(n.id)); }

  function getVisEdges(){
    const m={};
    base.forEach(e=>{
      if(e.ext && !showExt) return;
      const s=visAnc(e.s), d=visAnc(e.d);
      if(!s||!d||s===d) return;
      const k=s+"-"+d;
      if(!m[k]) m[k]={source:s,target:d,topics:new Set(),cnt:0,nature:e.nature,ext:e.ext};
      m[k].cnt++; if(e.topic) m[k].topics.add(e.topic);
    });
    return Object.values(m).map(e=>({...e,topics:[...e.topics]}));
  }

  function collapse(id){ exp.delete(id); (childrenOf[id]||[]).forEach(c=>{ if(exp.has(c)) collapse(c); }); }
  function expandTo(lv){ exp.clear(); raw.nodes.forEach(n=>{ if(!n.external && n.level<lv && childrenOf[n.id]) exp.add(n.id); }); rebuild(); }

  /* ── D3 setup ── */
  const svg = d3.select("svg");
  const W = window.innerWidth, H = window.innerHeight;
  const g = svg.append("g");
  svg.call(d3.zoom().scaleExtent([.03,12]).on("zoom",e=>g.attr("transform",e.transform)));
  svg.append("defs").append("marker").attr("id","arr").attr("viewBox","0 -5 10 10")
    .attr("refX",22).attr("refY",0).attr("markerWidth",5).attr("markerHeight",5)
    .attr("orient","auto").append("path").attr("d","M0,-4L10,0L0,4").attr("fill","#999");

  /* ── Stair layout: group by level, sort within level, stagger Y ── */
  function computeStairPositions(vn){
    // Group nodes by level (type)
    const layers = {EX:[], N:[], E:[], F:[]};
    const extNodes = [];
    vn.forEach(n=>{
      if(n.external){ extNodes.push(n); }
      else if(layers[n.type]) layers[n.type].push(n);
    });

    // Sort within each layer: group by parent, then by label
    for(const type of ["N","E","F"]){
      layers[type].sort((a,b)=>{
        const pa = parentOf[a.id]||0, pb = parentOf[b.id]||0;
        if(pa!==pb) return pa-pb;
        return (a.label||"").localeCompare(b.label||"");
      });
    }
    // EX sorted by label
    layers.EX.sort((a,b)=>(a.label||"").localeCompare(b.label||""));

    const margin = 60;
    let currentY = 80;

    for(const type of ["EX","N","E","F"]){
      const nodes = layers[type];
      if(!nodes.length) continue;

      const spacing = Math.max(NODE_SPACING, Math.min(200, (W - 2*margin) / nodes.length));
      // Center the layer
      const totalWidth = nodes.length * spacing;
      const startX = Math.max(margin, (W - totalWidth) / 2);

      nodes.forEach((n,i)=>{
        n.x = startX + i * spacing;
        if(stairMode === "inf"){
          n.y = currentY + i * STAIR_STEP;
        } else if(stairMode === "3"){
          n.y = currentY + (i % 3) * STAIR_STEP;
        } else {
          n.y = currentY;  // flat
        }
      });

      const maxY = nodes.reduce((m,n)=>Math.max(m,n.y), currentY);
      currentY = maxY + LAYER_GAP;
    }

    // External nodes: place after the last layer
    if(extNodes.length){
      const spacing = Math.max(60, Math.min(150, (W - 2*margin) / extNodes.length));
      const startX = Math.max(margin, (W - extNodes.length*spacing) / 2);
      extNodes.forEach((n,i)=>{
        n.x = startX + i * spacing;
        n.y = currentY + (stairMode==="3" ? (i%3)*STAIR_STEP : stairMode==="inf" ? i*8 : 0);
      });
    }
  }

  function rebuild(){
    const vn = getVisNodes(), ve = getVisEdges();
    g.selectAll("*").remove();

    // Compute stair positions
    computeStairPositions(vn);

    // Build id→node lookup for edges
    const vnMap = {};
    vn.forEach(n=>{ vnMap[n.id]=n; });

    // Edges — orthogonal routing (down from src, across, down to dst)
    const link = g.append("g").selectAll("path").data(ve).enter().append("path")
      .attr("class",d=>`link ${d.nature}${d.ext?" external":""}`)
      .attr("stroke-width",d=>Math.min(1+Math.log2(d.cnt+1),5))
      .attr("marker-end","url(#arr)")
      .attr("d",d=>{
        const sn=vnMap[d.source], dn=vnMap[d.target];
        if(!sn||!dn) return "";
        const sx=sn.x, sy=sn.y, tx=dn.x, ty=dn.y;
        if(Math.abs(sy-ty)<5){
          // Same layer: arc above
          const midX=(sx+tx)/2, rise=Math.min(-40, -Math.abs(tx-sx)*0.15);
          return `M${sx},${sy} Q${midX},${sy+rise} ${tx},${ty}`;
        }
        // Different layers: orthogonal routing
        const midY = (sy+ty)/2;
        return `M${sx},${sy} L${sx},${midY} L${tx},${midY} L${tx},${ty}`;
      });

    // Nodes
    const node = g.append("g").selectAll("g").data(vn,d=>d.id).enter().append("g")
      .attr("class",d=>{
        let c="node "+d.type;
        if(d.external) c+=" ext";
        if(childrenOf[d.id] && !d.external) c+=" has-children";
        return c;
      })
      .attr("transform",d=>`translate(${d.x},${d.y})`)
      .call(d3.drag()
        .on("drag",(e,d)=>{
          d.x=e.x; d.y=e.y;
          d3.select(e.sourceEvent.target.parentNode).attr("transform",`translate(${d.x},${d.y})`);
          // Update connected edges
          link.attr("d",ed=>{
            const sn=vnMap[ed.source], dn=vnMap[ed.target];
            if(!sn||!dn) return "";
            const sx=sn.x,sy=sn.y,tx=dn.x,ty=dn.y;
            if(Math.abs(sy-ty)<5){
              const midX=(sx+tx)/2, rise=Math.min(-40,-Math.abs(tx-sx)*0.15);
              return `M${sx},${sy} Q${midX},${sy+rise} ${tx},${ty}`;
            }
            const midY=(sy+ty)/2;
            return `M${sx},${sy} L${sx},${midY} L${tx},${midY} L${tx},${ty}`;
          });
        }));

    node.append("circle").attr("r",d=>R[d.type]||8);
    node.append("text").attr("dy",d=>(R[d.type]||8)+13)
      .text(d=>{
        if(!showLbl) return "";
        let l=d.label||""; if(l.startsWith("ext:")) l=l.slice(4);
        const p=l.split("/"); l=p[p.length-1]||l;
        return l.length>22?l.slice(0,20)+"..":l;
      });

    // Click → expand
    node.on("click",(ev,d)=>{
      ev.stopPropagation();
      if(childrenOf[d.id] && !d.external){
        exp.add(d.id); rebuild();
      } else {
        showInfo(d, ve); highlightNeighbors(d, node, link, ve);
      }
    });

    // Right-click → collapse parent
    node.on("contextmenu",(ev,d)=>{
      ev.preventDefault(); ev.stopPropagation();
      const p=parentOf[d.id];
      if(p!==undefined && exp.has(p)){ collapse(p); rebuild(); }
    });

    // Hover tooltip
    node.on("mouseenter",(ev,d)=>{
      const tt=document.getElementById("tooltip");
      const ch=childrenOf[d.id]||[];
      let txt=`[${d.type}] ${d.full_name||d.label||d.id}`;
      if(ch.length) txt+=` — click to expand (${ch.length} children)`;
      tt.textContent=txt; tt.style.display="block";
      tt.style.left=(ev.pageX+12)+"px"; tt.style.top=(ev.pageY-10)+"px";
    })
    .on("mousemove",(ev)=>{
      const tt=document.getElementById("tooltip");
      tt.style.left=(ev.pageX+12)+"px"; tt.style.top=(ev.pageY-10)+"px";
    })
    .on("mouseleave",()=>document.getElementById("tooltip").style.display="none");

    // Edge hover
    link.on("mouseenter",(ev,d)=>{
      const tt=document.getElementById("tooltip");
      const t=d.topics.length<=3?d.topics.join(", "):d.topics.slice(0,3).join(", ")+` +${d.topics.length-3}`;
      tt.textContent=`${d.nature} (${d.cnt} edges): ${t||"?"}`;
      tt.style.display="block";
      tt.style.left=(ev.pageX+12)+"px"; tt.style.top=(ev.pageY-10)+"px";
    })
    .on("mousemove",(ev)=>{
      const tt=document.getElementById("tooltip");
      tt.style.left=(ev.pageX+12)+"px"; tt.style.top=(ev.pageY-10)+"px";
    })
    .on("mouseleave",()=>document.getElementById("tooltip").style.display="none");

    // Background click → clear
    svg.on("click",()=>{
      node.classed("dim",false); link.classed("dim",false);
      document.getElementById("info").innerHTML="<h3>FISH Graph</h3><p style='color:#666;font-size:12px'><b>Click</b> to expand. <b>Right-click</b> to collapse.</p>";
    });

    // Stats
    const tc={}; vn.forEach(n=>{ tc[n.type]=(tc[n.type]||0)+1; });
    document.getElementById("stats").innerHTML=
      `Visible: ${vn.length} nodes, ${ve.length} edges — `+
      Object.entries(tc).map(([k,v])=>k+":"+v).join(" ");
  }

  function highlightNeighbors(d, node, link, ve){
    const connected = new Set([d.id]);
    ve.forEach(e=>{
      const s=typeof e.source==="object"?e.source.id:e.source;
      const t=typeof e.target==="object"?e.target.id:e.target;
      if(s===d.id) connected.add(t);
      if(t===d.id) connected.add(s);
    });
    node.classed("dim",n=>!connected.has(n.id));
    link.classed("dim",e=>{
      const s=typeof e.source==="object"?e.source.id:e.source;
      const t=typeof e.target==="object"?e.target.id:e.target;
      return s!==d.id && t!==d.id;
    });
  }

  function showInfo(d, ve){
    let h=`<h3>[${d.type}] ${d.label||d.id}</h3>`;
    h+=`<div class="field"><span class="key">ID:</span> <span class="val">${d.id}</span></div>`;
    if(d.pid) h+=`<div class="field"><span class="key">PID:</span> <span class="val">${d.pid}</span></div>`;
    if(d.full_name) h+=`<div class="field"><span class="key">Full name:</span> <span class="val">${d.full_name}</span></div>`;
    if(d.etype) h+=`<div class="field"><span class="key">Entity type:</span> <span class="val">${d.etype}</span></div>`;
    if(d.ptype) h+=`<div class="field"><span class="key">Func type:</span> <span class="val">${d.ptype}</span></div>`;
    if(d.external) h+=`<div class="field"><span class="key">External:</span> <span class="val">yes</span></div>`;
    const ch=childrenOf[d.id]||[];
    if(ch.length) h+=`<div class="field"><span class="key">Children:</span> <span class="val">${ch.length}</span></div>`;
    if(d.aspects && d.aspects.length){
      h+=`<div class="field"><span class="key">Aspects (${d.aspects.length}):</span></div>`;
      d.aspects.slice(0,20).forEach(a=>{
        h+=`<div class="field" style="margin-left:10px"><span class="val">${a.aspect}: ${a.topic||a.service||""}</span></div>`;
      });
      if(d.aspects.length>20) h+=`<div class="field" style="margin-left:10px;color:#888">+${d.aspects.length-20} more</div>`;
    }
    const inc=[], out=[];
    ve.forEach(e=>{
      const s=typeof e.source==="object"?e.source.id:e.source;
      const t=typeof e.target==="object"?e.target.id:e.target;
      if(t===d.id) inc.push({from:byId[s],e});
      if(s===d.id) out.push({to:byId[t],e});
    });
    if(inc.length){
      h+=`<div class="field"><span class="key">← Incoming (${inc.length}):</span></div>`;
      inc.slice(0,15).forEach(({from,e})=>{
        const lbl=from?(from.label||"").split("/").pop():"?";
        h+=`<div class="field" style="margin-left:10px"><span class="val">${e.nature} from [${from?.type}] ${lbl} (${e.cnt})</span></div>`;
      });
    }
    if(out.length){
      h+=`<div class="field"><span class="key">→ Outgoing (${out.length}):</span></div>`;
      out.slice(0,15).forEach(({to,e})=>{
        const lbl=to?(to.label||"").split("/").pop():"?";
        h+=`<div class="field" style="margin-left:10px"><span class="val">${e.nature} to [${to?.type}] ${lbl} (${e.cnt})</span></div>`;
      });
    }
    document.getElementById("info").innerHTML=h;
  }

  /* ── controls ── */
  document.getElementById("expandLevel").onchange=function(){ expandTo(+this.value); };
  document.getElementById("collapseAll").onclick=()=>{ exp.clear(); document.getElementById("expandLevel").value="0"; rebuild(); };
  document.getElementById("showExternal").onchange=function(){ showExt=this.checked; rebuild(); };
  document.getElementById("showLabels").onchange=function(){ showLbl=this.checked; rebuild(); };
  document.getElementById("stairMode").onchange=function(){ stairMode=this.value; rebuild(); };

  rebuild();
});
</script>
</body>
</html>
