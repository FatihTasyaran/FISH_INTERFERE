<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>FISH — Per-callback Gantt (gantt-cb)</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; font: 12px/1.4 'Segoe UI', system-ui, sans-serif; background: #fafafa; color: #222; overflow: hidden; }
  #toolbar { display: flex; align-items: center; gap: 10px; padding: 6px 12px; background: #fff; border-bottom: 1px solid #ddd; }
  #toolbar select, #toolbar button, #toolbar input { padding: 3px 8px; font: inherit; border: 1px solid #ccc; border-radius: 3px; background: #fff; }
  #toolbar button:hover { background: #f0f0f0; cursor: pointer; }
  #toolbar .sep { width: 1px; height: 20px; background: #ddd; }
  #stats { color: #666; font-size: 11px; margin-left: auto; }
  #trace-status { font-size: 11px; color: #c0392b; font-weight: 600; padding: 2px 8px; background: #fdedec; border: 1px solid #f5b7b1; border-radius: 3px; display: none; }
  #legend { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 12px; background: #f7f7f7; border-bottom: 1px solid #ddd; font-size: 11px; max-height: 50px; overflow-y: auto; }
  #legend .swatch { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 3px; background: #fff; border: 1px solid #ddd; cursor: pointer; }
  #legend .swatch .dot { width: 10px; height: 10px; border-radius: 2px; }
  #legend .swatch.muted { opacity: 0.35; }
  /* Two-pane layout: collapsible layer tree on the left, gantt on the right. */
  #main { display: flex; height: calc(100vh - 90px); }
  #layer-tree {
    width: 260px; min-width: 100px; max-width: 50vw;
    border-right: 1px solid #ddd; background: #fcfcfc;
    overflow: auto; user-select: none; flex-shrink: 0;
  }
  #layer-tree .header {
    padding: 6px 10px; background: #f0f0f0; border-bottom: 1px solid #ddd;
    font-weight: 600; font-size: 11px; color: #444;
    display: flex; align-items: center; justify-content: space-between;
  }
  #layer-tree .header button {
    padding: 1px 6px; font-size: 10px; border: 1px solid #ccc;
    border-radius: 3px; background: #fff; cursor: pointer;
  }
  #layer-tree ul { list-style: none; padding: 0; margin: 0; }
  #layer-tree li { padding: 1px 6px 1px 0; cursor: pointer; }
  #layer-tree li:hover > .row { background: #eef5fc; }
  #layer-tree li.active > .row { background: #d9ebf9; font-weight: 600; }
  #layer-tree .row { display: flex; align-items: center; gap: 4px; padding: 1px 4px; border-radius: 2px; }
  #layer-tree .tri { font-size: 9px; width: 10px; display: inline-block; color: #888; }
  #layer-tree .tri.leaf { color: transparent; }
  #layer-tree .ctype {
    display: inline-block; width: 14px; height: 14px; line-height: 14px;
    text-align: center; border-radius: 2px; font-size: 9px; color: #fff;
    font-weight: 700;
  }
  #layer-tree .ctype.EX { background: #5DADE2; }
  #layer-tree .ctype.N  { background: #58D68D; color: #fff; }
  #layer-tree .ctype.E  { background: #F4D03F; color: #333; }
  #layer-tree .ctype.F  { background: #BDC3C7; color: #333; }
  /* GPU-submitter badge — matches the gantt bar.gpu border */
  #layer-tree .ctype.gpu {
    box-shadow: 0 0 0 2.5px #c0392b;
    /* small offset so the thick stroke doesn't collide with the row hover bg */
    margin: 0 2px;
  }
  #layer-tree .name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #layer-tree .badge { font-size: 9px; color: #888; padding-left: 4px; }
  #layer-tree li.collapsed > ul { display: none; }
  #layer-tree li > ul { padding-left: 16px; }
  /* Outer scrollable container — vertical scroll appears when lanes don't fit. */
  #chart-wrap { flex: 1; height: 100%; overflow: auto; position: relative; }
  #chart { display: block; }
  .lane-row { fill: #fff; }
  .lane-row.alt { fill: #f8f8f8; }
  .lane-label { fill: #555; font-size: 10px; }
  .axis path, .axis line { stroke: #ccc; }
  .axis text { fill: #555; font-size: 10px; }
  .bar { stroke: #fff; stroke-width: 0.3; cursor: pointer; }
  .bar:hover { stroke: #000; stroke-width: 1; }
  .bar.dim { opacity: 0.08; }
  /* Trace-mode strokes — must be defined BEFORE .bar.gpu so that, when a bar
     has BOTH the trace class and the gpu class, the gpu border still wins
     (same specificity → later rule wins) */
  .bar.trace-anchor { stroke: #c0392b; stroke-width: 2; }
  .bar.trace-up    { stroke: #27ae60; stroke-width: 1.5; }
  .bar.trace-down  { stroke: #2980b9; stroke-width: 1.5; }
  /* GPU-submitter callbacks: thin red border so a packed bar is still readable */
  .bar.gpu { stroke: #c0392b; stroke-width: 1.2; }
  .causal-arrow { fill: none; pointer-events: none; }
  .causal-arrow.down { stroke: #2980b9; stroke-opacity: 0.85; }
  .causal-arrow.up   { stroke: #27ae60; stroke-opacity: 0.85; }
  /* Hyperperiod overlay — vertical guide lines anchored at first tmr firing.
     - .hp-tmr     : per-EX LCM of timer-only periods
     - .hp-session : application-wide LCM */
  .hp-line.hp-tmr { stroke: #c0392b; stroke-width: 1.2; stroke-dasharray: 6,3; stroke-opacity: 0.7; pointer-events: none; }
  .hp-line.hp-session { stroke: #1f4e79; stroke-width: 2; stroke-dasharray: 10,4; stroke-opacity: 0.85; pointer-events: none; }
  #tooltip { position: absolute; background: rgba(0,0,0,0.85); color: #fff; padding: 6px 9px; border-radius: 4px; font-size: 11px; pointer-events: none; z-index: 100; max-width: 500px; word-break: break-all; }
  #tooltip .k { color: #aaa; }
  #empty { padding: 30px; color: #888; }
</style>
</head>
<body>
<div id="toolbar">
  <b>FISH per-callback gantt</b> (rows=cb, bar fill=vtid)
  <label>Process:
    <select id="pid-select"><option value="">(all)</option></select>
  </label>
  <div class="sep"></div>
  <label>Trace depth:
    <input id="depth-input" type="number" min="1" max="20" value="5" style="width:48px">
  </label>
  <button id="trace-clear" title="Clear causal trace highlight (Esc)">✕ clear</button>
  <span id="trace-status"></span>
  <div class="sep"></div>
  <div class="sep"></div>
  <label id="hp-tmr-label" style="cursor:help">
    <input type="checkbox" id="hp-tmr-toggle"> H<sub>tmr</sub>
  </label>
  <label id="hp-session-label" style="cursor:help">
    <input type="checkbox" id="hp-session-toggle"> H<sub>session</sub>
  </label>
  <div class="sep"></div>
  <label id="gpu-marker-label" style="cursor:help">
    <input type="checkbox" id="gpu-marker-toggle"> ⚡ GPU
  </label>
  <button id="zoom-reset">Reset zoom</button>
  <span style="color:#888">scroll = zoom · drag = pan · click bar = trace</span>
  <span id="stats"></span>
</div>
<div id="legend"></div>
<div id="main">
  <div id="layer-tree">
    <div class="header">
      <span>FISH layers (L0 → L3)</span>
      <span><button id="tree-expand">expand</button>
            <button id="tree-collapse">collapse</button>
            <button id="tree-clear">×</button></span>
    </div>
    <ul id="tree-root"></ul>
  </div>
  <div id="chart-wrap"><svg id="chart"></svg></div>
</div>
<div id="tooltip" style="display:none"></div>

<script>
const qs = new URLSearchParams(window.location.search);
const session_id = qs.get('session_id') || qs.get('session') || '';
const scope = qs.get('scope') || '__main__';
document.title = `FISH gantt-cb — ${session_id}`;

const gurl = `/api/gantt?session_id=${encodeURIComponent(session_id)}&scope=${encodeURIComponent(scope)}`;
const curl = `/api/causal?session_id=${encodeURIComponent(session_id)}&scope=${encodeURIComponent(scope)}`;
const turl = `/api/taskset?session_id=${encodeURIComponent(session_id)}&scope=${encodeURIComponent(scope)}`;

let gpuSubmitterCbs = new Set();
let gpuMarkerOn = false; // toolbar toggle state (default off; user opts in)
let taskset = null;      // {executors: {pid: {hyperperiod_ns, hyperperiod_tmr_only_ns, ...}}, ...}
if (!session_id) {
  document.body.innerHTML = `<div id="empty">Missing <code>?session_id=...</code> in URL.<br>` +
    `Try: <code>/gantt-cb?session_id=&lt;your_session_id&gt;</code></div>`;
} else {
  const fetchJson = (url, label) => fetch(url).then(async r => {
    const txt = await r.text();
    if (!r.ok) throw new Error(`${label} HTTP ${r.status}: ${txt.slice(0, 200)}`);
    try { return JSON.parse(txt); }
    catch (e) { throw new Error(`${label} returned non-JSON (first 200 chars): ${txt.slice(0, 200)}`); }
  });
  Promise.all([fetchJson(gurl, 'gantt'), fetchJson(curl, 'causal'), fetchJson(turl, 'taskset').catch(_=>null)])
    .then(([gantt, causal, ts]) => {
      gpuSubmitterCbs = new Set(gantt.gpu_submitter_cbs || []);
      taskset = ts;
      render(gantt, causal);
    })
    .catch(err => document.body.innerHTML = `<div id="empty">Error: ${err.message || err}</div>`);
}

function render(raw, causal) {
  // Spans with stable id = index
  const spans = raw.spans.map((a, idx) => ({
    id: idx,
    pid: a[0], vtid: a[1], t0: a[2], t1: a[3],
    node: a[4], entity: a[5], etype: a[6], symbol: a[7], cb_addr: a[8],
  }));
  const t0_min = raw.t0_min_ns;

  document.getElementById('stats').textContent =
    `${spans.length} spans · ${causal.n_pubs} pubs / ${causal.n_topics} topics`;

  // Causal indices
  // pubs: [(ts_abs, vtid, pub_cb_addr, topic)] → make pub events with relative ts
  const pubEvents = causal.pubs.map(p => ({
    ts: p[0] - t0_min, ts_abs: p[0], vtid: p[1], pub_cb_addr: p[2], topic: p[3],
  })).sort((a, b) => a.ts - b.ts);

  const subsByTopic = new Map();   // topic → Set<cb_addr>
  for (const [tp, lst] of Object.entries(causal.subs_by_topic || {})) {
    subsByTopic.set(tp, new Set(lst));
  }

  // Spans sorted by start within each vtid (for "next callback start ≥ t" lookups)
  const spansByVtid = new Map();
  for (const s of spans) {
    if (!spansByVtid.has(s.vtid)) spansByVtid.set(s.vtid, []);
    spansByVtid.get(s.vtid).push(s);
  }
  for (const v of spansByVtid.values()) v.sort((a, b) => a.t0 - b.t0);

  // Span lookup: which span contains a given (vtid, ts)?
  function spanAt(vtid, tsRel) {
    const arr = spansByVtid.get(vtid);
    if (!arr) return null;
    // binary search for first s with s.t0 > tsRel, then check s-1
    let lo = 0, hi = arr.length;
    while (lo < hi) {
      const m = (lo + hi) >> 1;
      if (arr[m].t0 <= tsRel) lo = m + 1; else hi = m;
    }
    if (lo === 0) return null;
    const cand = arr[lo - 1];
    return (cand.t1 >= tsRel) ? cand : null;
  }
  // First span with given cb_addr starting after tsRel (any vtid)
  function nextSpanByCb(cbAddr, afterTs) {
    let best = null;
    for (const arr of spansByVtid.values()) {
      // binary search first s with s.t0 > afterTs
      let lo = 0, hi = arr.length;
      while (lo < hi) {
        const m = (lo + hi) >> 1;
        if (arr[m].t0 <= afterTs) lo = m + 1; else hi = m;
      }
      for (let i = lo; i < arr.length; i++) {
        if (arr[i].cb_addr === cbAddr) {
          if (!best || arr[i].t0 < best.t0) best = arr[i];
          break;
        }
      }
    }
    return best;
  }

  // Pub events grouped by (vtid) → sorted by ts for fast "events within a span" lookups
  const pubsByVtid = new Map();
  for (const ev of pubEvents) {
    if (!pubsByVtid.has(ev.vtid)) pubsByVtid.set(ev.vtid, []);
    pubsByVtid.get(ev.vtid).push(ev);
  }

  function pubEventsWithinSpan(s) {
    const arr = pubsByVtid.get(s.vtid);
    if (!arr) return [];
    const out = [];
    for (const ev of arr) {
      if (ev.ts >= s.t0 && ev.ts <= s.t1) out.push(ev);
      else if (ev.ts > s.t1) break;
    }
    return out;
  }

  // Downstream (forward) BFS from a span: follow each publish → find first
  // span on each subscriber cb_addr starting after the publish.
  function bfs(startSpan, maxDepth, direction /* 'down' | 'up' */) {
    const visited = new Map();   // span.id → depth
    const edges = [];            // [{src, dst, topic}]
    const q = [{s: startSpan, d: 0}];
    visited.set(startSpan.id, 0);
    while (q.length) {
      const {s: cur, d} = q.shift();
      if (d >= maxDepth) continue;
      if (direction === 'down') {
        const pubs = pubEventsWithinSpan(cur);
        for (const ev of pubs) {
          const subs = subsByTopic.get(ev.topic);
          if (!subs) continue;
          for (const cb of subs) {
            const next = nextSpanByCb(cb, ev.ts);
            if (next && !visited.has(next.id)) {
              visited.set(next.id, d + 1);
              edges.push({src: cur, dst: next, topic: ev.topic, ev_ts: ev.ts});
              q.push({s: next, d: d + 1});
            }
          }
        }
      } else { // upstream
        // What spans published a topic to which cur.cb_addr is subscribed AND
        // cur is the first span with cur.cb_addr starting after that pub.ts?
        for (const ev of pubEvents) {
          if (ev.ts >= cur.t0) continue;  // must be before cur starts
          const subs = subsByTopic.get(ev.topic);
          if (!subs || !subs.has(cur.cb_addr)) continue;
          // Is cur really the FIRST span with this cb_addr after ev.ts?
          const cand = nextSpanByCb(cur.cb_addr, ev.ts);
          if (!cand || cand.id !== cur.id) continue;
          // Find pub_span owning this event
          const pubSpan = spanAt(ev.vtid, ev.ts);
          if (pubSpan && !visited.has(pubSpan.id)) {
            visited.set(pubSpan.id, d + 1);
            edges.push({src: pubSpan, dst: cur, topic: ev.topic, ev_ts: ev.ts});
            q.push({s: pubSpan, d: d + 1});
          }
        }
      }
    }
    return {visited, edges};
  }

  // ---------- UI ----------
  const pids = [...new Set(spans.map(s => s.pid))].sort((a,b)=>a-b);
  const pidSel = document.getElementById('pid-select');
  pids.forEach(p => {
    const cnt = spans.filter(s => s.pid===p).length;
    const o = document.createElement('option');
    o.value = p; o.textContent = `pid ${p}  (${cnt} spans)`;
    pidSel.appendChild(o);
  });
  // Default to (all) — the layer tree on the left is the primary navigation;
  // narrowing to a single pid is opt-in via the dropdown.
  pidSel.value = '';
  pidSel.onchange = () => { traceState = null; draw(); };

  // Color: ROS node
  const nodes = [...new Set(spans.map(s => s.node))].sort();
  const palette = d3.schemeTableau10.concat(d3.schemeSet3, d3.schemePaired);
  const colorFor = new Map(nodes.map((n,i) => [n, palette[i % palette.length]]));
  const muted = new Set();

  const legendEl = document.getElementById('legend');
  nodes.forEach(n => {
    const cnt = spans.filter(s => s.node===n).length;
    const div = document.createElement('div');
    div.className = 'swatch';
    div.innerHTML = `<span class="dot" style="background:${colorFor.get(n)}"></span> ${n} (${cnt})`;
    div.onclick = () => { muted.has(n) ? muted.delete(n) : muted.add(n);
                          div.classList.toggle('muted'); redrawBars(); };
    legendEl.appendChild(div);
  });

  const svg = d3.select('#chart');
  const tooltip = d3.select('#tooltip');
  const traceStatus = document.getElementById('trace-status');
  const margin = {top: 30, right: 20, bottom: 10, left: 120};

  // render()-scoped maps. gantt-cb keys lanes by cb_addr (not vtid).
  // We still need vtid→pid mapping because bars are filled by their executing
  // vtid's process color (showing "which thread ran this execution").
  const vtidToPid = new Map();
  const vtidToProcName = new Map();
  const pidContainerName = new Map();
  const pidAnyName = new Map();
  // cb_addr → {pid, node, entity, etype, symbol, ex_label}
  const cbInfo = new Map();
  // pid → categorical color, node label → shade of its pid color
  let pidColor = null;
  const nodeColor = new Map();

  let gMain = null, gBars = null, gArrows = null, gHyper = null;
  // Each entry: {pid, yTop, yBot, hp_all_ns, hp_tmr_ns} — populated by draw(),
  // consumed by redrawHyperperiods() to draw lines clipped to that pid band.
  let hpBands = [];
  let xScale = null, xZoomed = null, yScale = null;
  let curSpans = spans, curCbs = [];   // curCbs = ordered cb_addrs for current view
  let traceState = null;   // {anchor, up:{visited,edges}, down:{visited,edges}}

  // Pid → human label (container name preferred). Available outside draw()
  // so redrawBars() can use it in its bar tooltip.
  function labelForPidGlobal(pid) {
    return pidContainerName.get(pid) || pidAnyName.get(pid) || `pid ${pid}`;
  }

  // HSL shade derivation: given a base hex color, produce N visually-distinct
  // shades by varying lightness ±, returning a function shade(i, total).
  function _hexToHsl(hex) {
    const c = hex.replace('#', '');
    const r = parseInt(c.slice(0,2),16)/255, g=parseInt(c.slice(2,4),16)/255, b=parseInt(c.slice(4,6),16)/255;
    const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
    let h=0,s=0, l=(mx+mn)/2;
    if (mx !== mn) {
      const d = mx - mn;
      s = l > 0.5 ? d/(2-mx-mn) : d/(mx+mn);
      switch(mx) {
        case r: h = (g-b)/d + (g<b?6:0); break;
        case g: h = (b-r)/d + 2; break;
        case b: h = (r-g)/d + 4; break;
      }
      h /= 6;
    }
    return [h*360, s*100, l*100];
  }
  function _hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const k = n => (n + h/30) % 12;
    const a = s * Math.min(l, 1 - l);
    const f = n => {
      const c = k(n);
      return l - a * Math.max(-1, Math.min(c - 3, 9 - c, 1));
    };
    const r = Math.round(f(0)*255), g = Math.round(f(8)*255), b = Math.round(f(4)*255);
    return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
  }
  function shadesOf(baseHex, total) {
    // Equally-spaced lightness shades centered on the base color's L,
    // confined to a comfortable range (avoid too-dark / too-light).
    if (total <= 1) return [baseHex];
    const [h, s] = _hexToHsl(baseHex);
    // Range in L from 35% to 70% (avoids invisible-light and gunmetal-dark)
    const lMin = 35, lMax = 70;
    const step = (lMax - lMin) / (total - 1);
    return Array.from({length: total}, (_, i) => _hslToHex(h, Math.max(40, s), lMin + i*step));
  }

  const zoom = d3.zoom().scaleExtent([1, 100000]).on('zoom', ev => {
    xZoomed = ev.transform.rescaleX(xScale);
    redrawBars(); redrawArrows(); redrawHyperperiods();
    gMain.select('.x-axis').call(d3.axisTop(xZoomed).tickFormat(d => `${(d/1e6).toFixed(2)}ms`));
  });

  function draw() {
    svg.selectAll('*').remove();
    const pidV = pidSel.value;
    curSpans = pidV ? spans.filter(s => s.pid===+pidV) : spans;
    if (!curSpans.length) { svg.append('text').attr('x', 40).attr('y', 40).text('No spans'); return; }

    // ── First pass: build per-pid identity maps + per-cb info ──
    vtidToPid.clear(); pidContainerName.clear(); pidAnyName.clear(); vtidToProcName.clear();
    cbInfo.clear();
    for (const s of curSpans) {
      if (!vtidToPid.has(s.vtid)) vtidToPid.set(s.vtid, s.pid);
      if (!pidContainerName.has(s.pid) && s.node && s.node.startsWith('cnt_')) {
        pidContainerName.set(s.pid, s.node);
      }
      if (!pidAnyName.has(s.pid) && s.node && s.node !== '(unknown)' && !s.node.startsWith('cnt_')) {
        pidAnyName.set(s.pid, s.node);
      }
      if (!cbInfo.has(s.cb_addr)) {
        cbInfo.set(s.cb_addr, {
          pid: s.pid, node: s.node, entity: s.entity, etype: s.etype, symbol: s.symbol,
        });
      }
    }
    const labelForPid = (pid) =>
      pidContainerName.get(pid) || pidAnyName.get(pid) || `pid ${pid}`;
    for (const v of vtidToPid.keys()) {
      vtidToProcName.set(v, labelForPid(vtidToPid.get(v)));
    }
    for (const [cb, info] of cbInfo) {
      info.ex_label = labelForPid(info.pid);
    }

    // ── Sort cb_addrs by (executor → node → entity → cb_addr) ──
    curCbs = [...cbInfo.keys()].sort((a, b) => {
      const A = cbInfo.get(a), B = cbInfo.get(b);
      if (A.pid !== B.pid) return A.pid - B.pid;
      if (A.node !== B.node) return (A.node || '').localeCompare(B.node || '');
      if (A.entity !== B.entity) return (A.entity || '').localeCompare(B.entity || '');
      return a.localeCompare(b);
    });

    // ── Color hierarchy ──
    // Executor gets a categorical palette color; each node within that executor
    // gets an HSL-equal-step shade of its executor's color.
    const distinctPids = [...new Set(curCbs.map(c => cbInfo.get(c).pid))];
    pidColor = d3.scaleOrdinal()
      .domain(distinctPids)
      .range(d3.schemeTableau10.concat(d3.schemePaired));
    // Group nodes per pid → assign shades
    const nodesByPid = {};
    for (const c of curCbs) {
      const i = cbInfo.get(c);
      if (!nodesByPid[i.pid]) nodesByPid[i.pid] = [];
      if (!nodesByPid[i.pid].includes(i.node)) nodesByPid[i.pid].push(i.node);
    }
    nodeColor.clear();
    for (const [pid, nodes] of Object.entries(nodesByPid)) {
      const base = pidColor(+pid);
      const shades = shadesOf(base, nodes.length);
      nodes.forEach((n, i) => nodeColor.set(`${pid}|${n}`, shades[i]));
    }
    const colorForCb = (cb) => {
      const i = cbInfo.get(cb);
      return nodeColor.get(`${i.pid}|${i.node}`) || pidColor(i.pid);
    };

    // ── Layout ──
    const wrap = document.getElementById('chart-wrap');
    const w = wrap.clientWidth;
    const viewportH = wrap.clientHeight;
    const MIN_LANE = 16, MAX_LANE = 32, DEFAULT_LANE = 22;
    const availH = viewportH - margin.top - margin.bottom;
    let laneH = availH / curCbs.length;
    if (laneH < MIN_LANE)      laneH = MIN_LANE;
    else if (laneH > MAX_LANE) laneH = DEFAULT_LANE;
    const totalLanesH = curCbs.length * laneH;
    const svgH = Math.max(viewportH, margin.top + totalLanesH + margin.bottom);

    svg.attr('width', w).attr('height', svgH);

    xScale = d3.scaleLinear()
      .domain([d3.min(curSpans, s => s.t0), d3.max(curSpans, s => s.t1)])
      .range([margin.left, w - margin.right]);
    xZoomed = xScale;
    yScale = d3.scaleBand().domain(curCbs).range([margin.top, margin.top + totalLanesH]).padding(0.1);

    gMain = svg.append('g');

    // ── Executor boundaries (between groups of cbs from different EX) ──
    const exBoundaries = [];
    for (let i = 1; i < curCbs.length; i++) {
      const a = cbInfo.get(curCbs[i-1]).pid;
      const b = cbInfo.get(curCbs[i]).pid;
      if (a !== b) {
        exBoundaries.push(yScale(curCbs[i]) - yScale.step() * yScale.padding() / 2);
      }
    }

    // ── Per-cb lane: bg + colored bar + label ──
    curCbs.forEach((cb, i) => {
      const info = cbInfo.get(cb);
      const exCol = pidColor(info.pid);
      const ndCol = nodeColor.get(`${info.pid}|${info.node}`) || exCol;
      const cbCol = colorForCb(cb);
      const lblText = shortenSymbol(info.symbol) || info.entity || cb;

      gMain.append('rect')
        .attr('x', 0).attr('y', yScale(cb))
        .attr('width', w).attr('height', yScale.bandwidth())
        .attr('class', i % 2 === 0 ? 'lane-row' : 'lane-row alt');
      // Left margin tint: bigger shade band ("the node color") + thin executor stripe
      gMain.append('rect')
        .attr('x', 0).attr('y', yScale(cb))
        .attr('width', 6).attr('height', yScale.bandwidth())
        .attr('fill', exCol);
      gMain.append('rect')
        .attr('x', 6).attr('y', yScale(cb))
        .attr('width', margin.left - 24).attr('height', yScale.bandwidth())
        .attr('fill', ndCol).attr('opacity', 0.45);
      // cb swatch + lane label
      gMain.append('rect')
        .attr('class', 'cb-swatch')
        .attr('x', margin.left - 14).attr('y', yScale(cb) + yScale.bandwidth()/2 - 4)
        .attr('width', 6).attr('height', 8)
        .attr('fill', cbCol).attr('stroke', '#444').attr('stroke-width', 0.5);
      gMain.append('text').attr('class','lane-label')
        .attr('x', margin.left - 18).attr('y', yScale(cb) + yScale.bandwidth()/2)
        .attr('dy', '.35em').attr('text-anchor', 'end')
        .text(lblText)
        .style('cursor', 'help');
      // Lane-label hover: show the cb's executor + node + entity
      gMain.append('rect')
        .attr('x', 0).attr('y', yScale(cb))
        .attr('width', margin.left).attr('height', yScale.bandwidth())
        .attr('fill', 'transparent')
        .style('cursor', 'help')
        .on('mousemove', (ev) => {
          tooltip.style('display', 'block')
            .style('left', (ev.clientX + 12) + 'px')
            .style('top',  (ev.clientY + 12) + 'px')
            .html(`<b>${info.entity}</b><br>` +
                  `<span class="k">executor:</span> ${info.ex_label} (pid ${info.pid})<br>` +
                  `<span class="k">node:</span> ${info.node}<br>` +
                  `<span class="k">cb_addr:</span> ${cb}` +
                  (info.symbol ? `<br><span class="k">symbol:</span> ${info.symbol.slice(0,200)}` : ''));
        })
        .on('mouseleave', () => tooltip.style('display', 'none'));
    });

    exBoundaries.forEach(yb => {
      gMain.append('line').attr('class', 'pid-divider')
        .attr('x1', 0).attr('x2', w).attr('y1', yb).attr('y2', yb)
        .attr('stroke', '#444').attr('stroke-width', 1).attr('stroke-opacity', 0.7);
    });

    // ── Hyperperiod bands: one per EX (group of cb rows sharing same pid) ──
    hpBands = [];
    if (taskset && taskset.executors) {
      const cbsByPid = {};
      for (const cb of curCbs) {
        const p = cbInfo.get(cb).pid;
        if (!cbsByPid[p]) cbsByPid[p] = [];
        cbsByPid[p].push(cb);
      }
      for (const [pidStr, cbs] of Object.entries(cbsByPid)) {
        const ex = taskset.executors[pidStr];
        if (!ex) continue;
        const yTop = yScale(cbs[0]);
        const yBot = yScale(cbs[cbs.length-1]) + yScale.bandwidth();
        hpBands.push({
          pid: +pidStr, label: ex.label,
          yTop, yBot,
          hp_all_ns: ex.hyperperiod_ns,
          hp_tmr_ns: ex.hyperperiod_tmr_only_ns,
        });
      }
    }

    // X-axis at TOP so it stays in view even when lanes scroll below.
    gMain.append('g').attr('class', 'x-axis axis')
      .attr('transform', `translate(0,${margin.top - 2})`)
      .call(d3.axisTop(xScale).tickFormat(d => `${(d/1e6).toFixed(2)}ms`));
    // White band behind axis labels so they're readable over lane backgrounds
    gMain.insert('rect', '.x-axis')
      .attr('x', 0).attr('y', 0).attr('width', w).attr('height', margin.top - 2)
      .attr('fill', '#fff').attr('opacity', 0.95);

    svg.append('defs').append('clipPath').attr('id', 'bars-clip')
      .append('rect').attr('x', margin.left).attr('y', margin.top)
      .attr('width', w - margin.left - margin.right)
      .attr('height', totalLanesH);

    gBars = gMain.append('g').attr('clip-path', 'url(#bars-clip)').attr('class', 'bars-g');
    gArrows = gMain.append('g').attr('clip-path', 'url(#bars-clip)').attr('class', 'arrows-g');
    gHyper = gMain.append('g').attr('clip-path', 'url(#bars-clip)').attr('class', 'hp-g');

    computeTmrAnchors();
    redrawBars(); redrawArrows(); redrawHyperperiods();
    svg.call(zoom).on('dblclick.zoom', () => svg.transition().call(zoom.transform, d3.zoomIdentity));
  }

  let tmrAnchorByPid = new Map();
  let tmrAnchorSession = null;
  function computeTmrAnchors() {
    tmrAnchorByPid = new Map();
    tmrAnchorSession = null;
    if (!taskset || !taskset.executors) return;
    const tmrCbs = new Set();
    for (const ex of Object.values(taskset.executors)) {
      for (const t of (ex.tasks || [])) {
        if (t.period_source === 'tmr-nominal' && t.cb_addr) tmrCbs.add(t.cb_addr);
      }
    }
    if (tmrCbs.size === 0) return;
    for (const s of curSpans) {
      if (!tmrCbs.has(s.cb_addr)) continue;
      const cur = tmrAnchorByPid.get(s.pid);
      if (cur === undefined || s.t0 < cur) tmrAnchorByPid.set(s.pid, s.t0);
      if (tmrAnchorSession === null || s.t0 < tmrAnchorSession) tmrAnchorSession = s.t0;
    }
  }

  function redrawHyperperiods() {
    if (!gHyper) return;
    gHyper.selectAll('line').remove();
    const showTmr = document.getElementById('hp-tmr-toggle').checked;
    const showSession = document.getElementById('hp-session-toggle').checked;
    if (!showTmr && !showSession) return;
    const [x0, x1] = xZoomed.domain();

    function drawLine(h_ns, anchor_ns, yTop, yBot, cls) {
      if (!h_ns || h_ns <= 0 || anchor_ns == null) return;
      for (let t = anchor_ns; t <= x1; t += h_ns) {
        if (t < x0) continue;
        gHyper.append('line')
          .attr('class', `hp-line ${cls}`)
          .attr('x1', xZoomed(t)).attr('x2', xZoomed(t))
          .attr('y1', yTop).attr('y2', yBot);
      }
    }

    if (showTmr) {
      for (const band of hpBands) {
        drawLine(band.hp_tmr_ns, tmrAnchorByPid.get(band.pid), band.yTop, band.yBot, 'hp-tmr');
      }
    }
    if (showSession && taskset) {
      const h = taskset.session_hyperperiod_tmr_only_ns;
      const totalBottom = hpBands.length
        ? Math.max(...hpBands.map(b => b.yBot))
        : (yScale ? yScale.range()[1] : margin.top);
      drawLine(h, tmrAnchorSession, margin.top, totalBottom, 'hp-session');
    }
  }

  function classify(s) {
    // Layer-tree filter/hover takes priority when set (no trace active).
    // Hover gets first pick because it should always feel responsive.
    if (!traceState) {
      if (layerHoverCbs) {
        return layerHoverCbs.has(s.cb_addr) ? null : 'dim';
      }
      if (layerFilterCbs) {
        return layerFilterCbs.has(s.cb_addr) ? null : 'dim';
      }
      return null;
    }
    if (s.id === traceState.anchor.id) return 'trace-anchor';
    if (traceState.down.visited.has(s.id)) return 'trace-down';
    if (traceState.up.visited.has(s.id))   return 'trace-up';
    return 'dim';
  }

  function redrawBars() {
    gBars.selectAll('rect').remove();
    const visible = curSpans.filter(s => !muted.has(s.node));
    const [x0, x1] = xZoomed.domain();
    const inView = visible.filter(s => s.t1 >= x0 && s.t0 <= x1);

    gBars.selectAll('rect')
      .data(inView, s => s.id)
      .enter()
      .append('rect')
        .attr('class', s => {
          let cls = 'bar';
          const k = classify(s);
          if (k) cls += ' ' + k;
          if (gpuMarkerOn && gpuSubmitterCbs.has(s.cb_addr)) cls += ' gpu';
          return cls;
        })
        .attr('x', s => xZoomed(s.t0))
        .attr('y', s => yScale(s.cb_addr))    // row = cb_addr
        .attr('width', s => Math.max(0.5, xZoomed(s.t1) - xZoomed(s.t0)))
        .attr('height', yScale.bandwidth())
        // bar fill = pid color of the vtid that ran this execution
        .attr('fill', s => pidColor(vtidToPid.get(s.vtid) || s.pid))
        .on('mousemove', (ev, s) => {
          let causal = '';
          if (traceState && s.id === traceState.anchor.id) {
            causal = `<br><span class="k">trace:</span> ${traceState.up.visited.size-1} up · ${traceState.down.visited.size-1} down`;
          }
          tooltip.style('display', 'block')
            .style('left', (ev.clientX + 12) + 'px')
            .style('top',  (ev.clientY + 12) + 'px')
            .html(`<b>${s.entity}</b><br>` +
                  `<span class="k">ran on:</span> vtid <b>${s.vtid}</b> (pid ${s.pid}, ${labelForPidGlobal(s.pid)})<br>` +
                  `<span class="k">node:</span> ${s.node}<br>` +
                  `<span class="k">duration:</span> ${((s.t1-s.t0)/1e3).toFixed(1)} μs<br>` +
                  `<span class="k">cb_addr:</span> ${s.cb_addr}` +
                  (gpuSubmitterCbs.has(s.cb_addr) ? '<br><span style="color:#e74c3c">⚡ submits GPU work</span>' : '') +
                  causal);
        })
        .on('mouseleave', () => tooltip.style('display', 'none'))
        .on('click', (ev, s) => { ev.stopPropagation(); startTrace(s); });
  }

  function redrawArrows() {
    if (!gArrows) return;
    gArrows.selectAll('path').remove();
    if (!traceState) return;
    const drawEdges = (edges, cls) => {
      gArrows.selectAll(null).data(edges).enter().append('path')
        .attr('class', `causal-arrow ${cls}`)
        .attr('d', e => {
          const x1 = xZoomed(e.src.t1);
          const y1 = yScale(e.src.cb_addr) + yScale.bandwidth()/2;
          const x2 = xZoomed(e.dst.t0);
          const y2 = yScale(e.dst.cb_addr) + yScale.bandwidth()/2;
          const mx = (x1 + x2) / 2;
          return `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
        })
        .attr('stroke-width', 1.5)
        .attr('marker-end', cls === 'down' ? 'url(#arrow-down)' : 'url(#arrow-up)');
    };
    // arrow markers
    let defs = svg.select('defs');
    if (defs.select('#arrow-down').empty()) {
      defs.append('marker').attr('id','arrow-down').attr('viewBox','0 0 10 10')
        .attr('refX',8).attr('refY',5).attr('markerWidth',6).attr('markerHeight',6)
        .attr('orient','auto').append('path').attr('d','M 0 0 L 10 5 L 0 10 z').attr('fill','#2980b9');
      defs.append('marker').attr('id','arrow-up').attr('viewBox','0 0 10 10')
        .attr('refX',8).attr('refY',5).attr('markerWidth',6).attr('markerHeight',6)
        .attr('orient','auto').append('path').attr('d','M 0 0 L 10 5 L 0 10 z').attr('fill','#27ae60');
    }
    drawEdges(traceState.down.edges, 'down');
    drawEdges(traceState.up.edges,   'up');
  }

  function startTrace(s) {
    const depth = +document.getElementById('depth-input').value || 5;
    const down = bfs(s, depth, 'down');
    const up   = bfs(s, depth, 'up');
    traceState = {anchor: s, down, up};
    traceStatus.style.display = 'inline-block';
    traceStatus.textContent =
      `TRACE: ${s.node}::${s.entity} (vtid ${s.vtid}) — ↓${down.visited.size-1} ↑${up.visited.size-1}, depth ${depth}`;
    redrawBars(); redrawArrows();
  }
  function clearTrace() {
    traceState = null;
    traceStatus.style.display = 'none';
    redrawBars(); redrawArrows();
  }

  document.getElementById('hp-tmr-toggle').onchange = redrawHyperperiods;
  document.getElementById('hp-session-toggle').onchange = redrawHyperperiods;

  // Rich tooltips on hyperperiod toolbar labels — same style as the vtid hover.
  function _fmtNs(ns) {
    if (ns == null) return '—';
    if (ns < 1e6)   return `${(ns/1e3).toFixed(1)} µs`;
    if (ns < 1e9)   return `${(ns/1e6).toFixed(1)} ms`;
    return `${(ns/1e9).toFixed(2)} s`;
  }
  function _showHpTooltip(ev, html) {
    tooltip.style('display','block')
      .style('left', (ev.clientX + 12) + 'px')
      .style('top',  (ev.clientY + 12) + 'px')
      .html(html);
  }
  function _hideTooltip() { tooltip.style('display','none'); }

  const hpTmrLabel = document.getElementById('hp-tmr-label');
  const hpSessLabel = document.getElementById('hp-session-label');

  hpTmrLabel.onmousemove = (ev) => {
    const exHs = (taskset && taskset.executors)
      ? Object.entries(taskset.executors)
          .filter(([,e]) => e.hyperperiod_tmr_only_ns)
          .slice(0, 6)
          .map(([pid,e]) => `<span class="k">${pid}</span> ${_fmtNs(e.hyperperiod_tmr_only_ns)}`)
          .join(' &nbsp; ')
      : '';
    _showHpTooltip(ev,
      `<b>H<sub>tmr</sub> — per-EX hyperperiod (timers only)</b><br>` +
      `<span class="k">scope:</span> each executor band only<br>` +
      `<span class="k">includes:</span> tmr-nominal callbacks ONLY (explicit periods from rcl_timer_init)<br>` +
      `<span class="k">anchor:</span> first tmr firing in that executor (NOT t=0)<br>` +
      `<span class="k">use:</span> strictly periodic task model — RM/EDF schedulability analysis<br>` +
      `<span class="k">line style:</span> red dashed` +
      (exHs ? `<br><br><span class="k">first few:</span><br>${exHs}` : ''));
  };
  hpTmrLabel.onmouseleave = _hideTooltip;

  const gpuLabel = document.getElementById('gpu-marker-label');
  document.getElementById('gpu-marker-toggle').onchange = (ev) => {
    gpuMarkerOn = ev.target.checked;
    redrawBars();
    rebuildTree();   // tree badges respect the toggle too
  };
  gpuLabel.onmousemove = (ev) => {
    _showHpTooltip(ev,
      `<b>⚡ GPU submitters</b><br>` +
      `<span class="k">scope:</span> bars + layer-tree badges<br>` +
      `<span class="k">criterion:</span> a callback's execution window overlaps with at least one ` +
      `<code>cuda_runtime</code> call on the same vtid (i.e. the CB submitted GPU work)<br>` +
      `<span class="k">marker:</span> red border on bar / red outline on EX, N, E, F badges<br>` +
      `<span class="k">propagation:</span> tree badges light up if ANY descendant cb is a submitter<br>` +
      `<span class="k">count:</span> ${gpuSubmitterCbs.size} cb_addr(s) are GPU submitters`);
  };
  gpuLabel.onmouseleave = _hideTooltip;

  hpSessLabel.onmousemove = (ev) => {
    const h = taskset && taskset.session_hyperperiod_tmr_only_ns;
    _showHpTooltip(ev,
      `<b>H<sub>session</sub> — application-wide hyperperiod</b><br>` +
      `<span class="k">scope:</span> spans the whole chart, all executors<br>` +
      `<span class="k">formula:</span> LCM of every tmr-nominal period anywhere in the session<br>` +
      `<span class="k">anchor:</span> first tmr firing anywhere in the session (NOT t=0)<br>` +
      `<span class="k">value:</span> ${_fmtNs(h)}<br>` +
      `<span class="k">interpretation:</span> the real-time repetition unit of the whole app —<br>` +
      `&nbsp;&nbsp;every periodic task fires an integer number of times per H<sub>session</sub><br>` +
      `<span class="k">line style:</span> thick dark-blue dashed`);
  };
  hpSessLabel.onmouseleave = _hideTooltip;
  document.getElementById('trace-clear').onclick = clearTrace;
  document.getElementById('zoom-reset').onclick = () => svg.transition().call(zoom.transform, d3.zoomIdentity);
  document.getElementById('depth-input').onchange = () => { if (traceState) startTrace(traceState.anchor); };
  document.addEventListener('keydown', ev => { if (ev.key === 'Escape') { clearTrace(); clearLayerFilter(); }});

  // ===== Layer tree (L0 EX → L1 N → L2 E → L3 F) =====
  let layerFilterKey = null, layerFilterCbs = null, layerHoverCbs = null;

  // Heuristic shortener for demangled C++ / Python callback symbols.
  // The raw "symbol" field is huge (std::_Bind<void (*(...))(...)>, etc.).
  // We try, in order:
  //   1. Find the deepest meaningful "Namespace::Class::method" pattern,
  //      preferring non-std/non-rclcpp namespaces.
  //   2. For Python "a.b.c.method.<locals>.cb", strip <locals> and join last 2.
  //   3. Fall back to the first non-keyword identifier we see.
  function shortenSymbol(sym) {
    if (!sym) return '';
    if (sym.includes('<locals>')) {
      const parts = sym.split('<locals>')[0].split('.').filter(Boolean);
      return parts.slice(-2).join('.') + '.<locals>';
    }
    // Find ALL Namespace::Class::method-ish patterns (3+ identifiers separated by ::)
    const cppRe = /([A-Za-z_][A-Za-z0-9_]*(?:::[A-Za-z_][A-Za-z0-9_]*){1,3})\s*[\(<]/g;
    const matches = [];
    let m;
    while ((m = cppRe.exec(sym)) !== null) matches.push(m[1]);
    if (matches.length) {
      // Prefer non-std, non-internal — pick the LAST one that's not std-prefixed
      const meaningful = matches.filter(s =>
        !s.startsWith('std::') &&
        !s.startsWith('rclcpp::') &&
        !s.startsWith('message_filters::') &&
        !s.startsWith('rclcpp_action::') &&
        !s.startsWith('rclcpp_components::')
      );
      const pick = meaningful.length ? meaningful[meaningful.length-1] : matches[matches.length-1];
      // Trim to last 2 components if too long
      const segs = pick.split('::');
      return segs.length > 2 ? segs.slice(-2).join('::') : pick;
    }
    // Fallback: first identifier longer than 2 chars
    const id = /([A-Za-z_][A-Za-z0-9_]{2,})/.exec(sym);
    return id ? id[1] : sym.slice(0, 40);
  }

  function buildLayerTree(spansSubset) {
    const tree = {};
    for (const s of spansSubset) {
      const exLabel = pidContainerName.get(s.pid) || pidAnyName.get(s.pid) || `pid ${s.pid}`;
      const exKey = `EX:${s.pid}`;
      const nKey  = `${exKey}|N:${s.node}`;
      const eKey  = `${nKey}|E:${s.entity}`;
      const fKey  = `${eKey}|F:${s.cb_addr}`;
      if (!tree[exKey]) tree[exKey] = {type:'EX', label:exLabel, key:exKey, count:0, cbs:new Set(), children:{}};
      tree[exKey].count++; tree[exKey].cbs.add(s.cb_addr);
      const exN = tree[exKey].children;
      if (!exN[nKey]) exN[nKey] = {type:'N', label:s.node, key:nKey, count:0, cbs:new Set(), children:{}};
      exN[nKey].count++; exN[nKey].cbs.add(s.cb_addr);
      const nE = exN[nKey].children;
      if (!nE[eKey]) nE[eKey] = {type:'E', label:s.entity, key:eKey, count:0, cbs:new Set(), children:{}};
      nE[eKey].count++; nE[eKey].cbs.add(s.cb_addr);
      const eF = nE[eKey].children;
      const fLabel = shortenSymbol(s.symbol) || s.cb_addr;
      if (!eF[fKey]) eF[fKey] = {type:'F', label:fLabel, key:fKey, count:0, cbs:new Set([s.cb_addr])};
      eF[fKey].count++;
    }
    return tree;
  }

  function renderLayerTree(tree, parentEl) {
    parentEl.innerHTML = '';
    const entries = Object.values(tree).sort((a,b) => b.count - a.count);
    for (const node of entries) {
      const li = document.createElement('li');
      const row = document.createElement('span');
      row.className = 'row';
      const tri = document.createElement('span'); tri.className = 'tri';
      const hasChildren = node.children && Object.keys(node.children).length > 0;
      tri.textContent = hasChildren ? '▼' : '';
      if (!hasChildren) tri.classList.add('leaf');
      // A tree node is "GPU-active" when at least one of its descendant
      // callbacks submits GPU work — gated by the global toggle.
      const hasGpu = gpuMarkerOn && [...node.cbs].some(cb => gpuSubmitterCbs.has(cb));
      const ct = document.createElement('span');
      ct.className = `ctype ${node.type}${hasGpu ? ' gpu' : ''}`;
      ct.textContent = node.type;
      if (hasGpu) ct.title = 'descendant callback submits GPU work';
      const nm = document.createElement('span'); nm.className = 'name'; nm.textContent = node.label; nm.title = node.label;
      const bd = document.createElement('span'); bd.className = 'badge'; bd.textContent = `${node.count}`;
      row.appendChild(tri); row.appendChild(ct); row.appendChild(nm); row.appendChild(bd);
      li.appendChild(row);
      if (hasChildren) {
        const sub = document.createElement('ul');
        renderLayerTree(node.children, sub);
        li.appendChild(sub);
        tri.onclick = (ev) => {
          ev.stopPropagation();
          li.classList.toggle('collapsed');
          tri.textContent = li.classList.contains('collapsed') ? '▶' : '▼';
        };
      }
      li.onmouseenter = (ev) => { ev.stopPropagation(); layerHoverCbs = node.cbs; redrawBars(); };
      row.onclick = (ev) => {
        ev.stopPropagation();
        document.querySelectorAll('#layer-tree li.active').forEach(x => x.classList.remove('active'));
        if (layerFilterKey === node.key) {
          clearLayerFilter();
        } else {
          li.classList.add('active');
          layerFilterKey = node.key;
          layerFilterCbs = node.cbs;
          redrawBars();
        }
      };
      parentEl.appendChild(li);
    }
  }

  function clearLayerFilter() {
    layerFilterKey = null; layerFilterCbs = null; layerHoverCbs = null;
    document.querySelectorAll('#layer-tree li.active').forEach(x => x.classList.remove('active'));
    redrawBars();
  }

  document.getElementById('layer-tree').onmouseleave = () => { layerHoverCbs = null; redrawBars(); };
  document.getElementById('tree-clear').onclick = clearLayerFilter;
  document.getElementById('tree-expand').onclick = () => {
    document.querySelectorAll('#layer-tree li.collapsed').forEach(li => {
      li.classList.remove('collapsed');
      const tri = li.querySelector(':scope > .row > .tri');
      if (tri && tri.textContent === '▶') tri.textContent = '▼';
    });
  };
  document.getElementById('tree-collapse').onclick = () => {
    document.querySelectorAll('#layer-tree > ul > li').forEach(li => {
      if (!li.classList.contains('collapsed')) {
        li.classList.add('collapsed');
        const tri = li.querySelector(':scope > .row > .tri');
        if (tri && tri.textContent === '▼') tri.textContent = '▶';
      }
    });
  };

  function rebuildTree() {
    const tree = buildLayerTree(curSpans);
    renderLayerTree(tree, document.getElementById('tree-root'));
  }

  draw();
  rebuildTree();
  window.addEventListener('resize', () => draw());

  // Re-build tree whenever the pid filter changes (existing onchange already calls draw())
  const _origPidChange = pidSel.onchange;
  pidSel.onchange = () => { _origPidChange && _origPidChange(); rebuildTree(); };
}
</script>
</body>
</html>
